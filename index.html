<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <title>DevClub - Conversor Moeda</title>
</head>

<body>

    <img id="logo-image" src="./assets/0b855c3cee7fbceab7a89831e6096fe140b43ca9.gif" alt="DevClub-conversor-logo">

    <main>
        <label>Converter <b>de</b>
            <select class="convert-from">
                <option value="currency-real">R$ Real Brasileiro</option>
            </select>
        </label>

        <label>Converter <b>para</b>
            <select class="convert-to">
                <option value="dolar">US$ Dólar Americano</option>
                <option value="euro">€ Euro</option>
                <option value="libra">£ Libra</option>
            </select>
        </label>

        <label>Valor
            <input class="input-value" placeholder="R$ 10.000,00">
        </label>

        <button id="convert-button"> Converter</button>
        

    <section>
        <div class="money-box">
            <img src="./assets/real-logo.png" alt="logo-Real">
            <p class="coin">Real</p>
            <p class="result" id="a-ser-convertido">R$ Valor</p>
        </div>

        <img class="arrow-img" src="./assets/Vector.png" alt="arrow">

        <div class="money-box">
            <img src="./assets/dolar-logo.png" class="img-currency" alt="USA-logo">
            <p class="coin" id="currency-name">Dólar Americano</p>
            <p class="result" id="convertido">US$ Valor</p>
        </div>
    </section>
    </main>



<script src="./scripts.js"></script>
</body>

</html>
